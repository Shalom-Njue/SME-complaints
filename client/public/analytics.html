<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SME Analytics Dashboard</title>
    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/layout.css" />
    <link rel="stylesheet" href="css/components.css" />
    <link rel="stylesheet" href="css/pages.css" />
    <link rel="stylesheet" href="css/responsive.css" />
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
      /* Stats cards at the top */
      .stats-overview {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 20px;
        margin: 20px 0;
      }
      .stat-card {
        background: white;
        padding: 20px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
        text-align: center;
        border-left: 4px solid var(--primary-color);
      }
      .stat-card.pending {
        border-left-color: var(--warning-color);
      }
      .stat-card.in-progress {
        border-left-color: var(--info-color);
      }
      .stat-card.resolved {
        border-left-color: var(--success-color);
      }

      .stat-number {
        font-size: 36px;
        font-weight: bold;
        color: var(--primary-color);
        margin: 10px 0;
      }
      .stat-label {
        color: var(--text-light);
        font-size: 14px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }

      /* Charts grid */
      .charts-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
        gap: 20px;
        margin-top: 20px;
      }
      .chart-card {
        background: white;
        padding: 20px;
        border-radius: var(--radius-md);
        box-shadow: var(--shadow-sm);
      }
      .chart-card h3 {
        margin: 0 0 15px 0;
        color: var(--primary-color);
        font-size: 18px;
      }
      .chart-card.full {
        grid-column: 1 / -1;
      }

      .chart-wrap {
        position: relative;
        width: 100%;
        height: 300px;
      }
      .chart-wrap.large {
        height: 350px;
      }

      /* Ensure canvas is responsive */
      .chart-wrap canvas {
        max-width: 100%;
        height: auto !important;
      }

      @media (max-width: 768px) {
        .charts-grid {
          grid-template-columns: 1fr;
        }
        .stat-card {
          padding: 15px;
        }
        .stat-number {
          font-size: 28px;
        }
        .chart-wrap {
          height: 250px;
        }
        .chart-wrap.large {
          height: 300px;
        }
        .chart-card {
          padding: 15px;
        }
        .chart-card h3 {
          font-size: 16px;
        }
      }

      @media (max-width: 500px) {
        .charts-grid {
          grid-template-columns: 1fr;
        }
        .stats-overview {
          grid-template-columns: repeat(2, 1fr);
        }
        .chart-wrap {
          height: 220px;
        }
        .chart-wrap.large {
          height: 280px;
        }
      }
    </style>
  </head>
  <body>
    <div class="container" style="max-width: 1200px">
      <header
        style="
          display: flex;
          justify-content: space-between;
          align-items: center;
          flex-wrap: wrap;
          gap: 15px;
        "
      >
        <div>
          <h1 style="margin-bottom: 5px">📊 Analytics Dashboard</h1>
          <p style="color: var(--text-light); margin: 0">
            Comprehensive complaint insights and trends
          </p>
        </div>
        <a href="admin.html" style="text-decoration: none">
          <button class="btn btn-secondary">← Back to Dashboard</button>
        </a>
      </header>

      <!-- Stats Overview -->
      <div class="stats-overview">
        <div class="stat-card">
          <div class="stat-label">Total Complaints</div>
          <div class="stat-number" id="totalComplaints">0</div>
        </div>
        <div class="stat-card pending">
          <div class="stat-label">Pending</div>
          <div class="stat-number" id="pendingCount">0</div>
        </div>
        <div class="stat-card in-progress">
          <div class="stat-label">In Progress</div>
          <div class="stat-number" id="inProgressCount">0</div>
        </div>
        <div class="stat-card resolved">
          <div class="stat-label">Resolved</div>
          <div class="stat-number" id="resolvedCount">0</div>
        </div>
      </div>

      <!-- Charts Grid -->
      <div class="charts-grid">
        <div class="chart-card">
          <h3>🔝 Top 5 Categories</h3>
          <div class="chart-wrap">
            <canvas id="topCategoriesChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>📊 Status Distribution</h3>
          <div class="chart-wrap">
            <canvas id="statusChart"></canvas>
          </div>
        </div>

        <div class="chart-card full">
          <h3>📈 Submission Trend Over Time</h3>
          <div class="chart-wrap large">
            <canvas id="trendChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>⏱️ Average Resolution Time</h3>
          <div class="chart-wrap">
            <canvas id="resolutionChart"></canvas>
          </div>
        </div>

        <div class="chart-card">
          <h3>📋 Complaints by Category</h3>
          <div class="chart-wrap">
            <canvas id="categoryChart"></canvas>
          </div>
        </div>
      </div>
    </div>

    <script src="js/main.js"></script>
    <script>
      async function loadAnalytics() {
        try {
          const res = await fetch("/api/admin/analytics");
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const result = await res.json();
          if (result.success) {
            updateStats(result.data);
            renderCharts(result.data);
          }
        } catch (err) {
          console.error("Failed to load analytics:", err);
          showToast(
            "Unable to load analytics. Please check your connection and try again.",
            "error",
            "Connection Error",
          );
        }
      }

      function updateStats(data) {
        // Calculate totals
        const total = data.statusData.reduce(
          (sum, item) => sum + item.count,
          0,
        );
        const pending =
          data.statusData.find((s) => s._id === "Pending")?.count || 0;
        const inProgress =
          data.statusData.find((s) => s._id === "In Progress")?.count || 0;
        const resolved =
          data.statusData.find((s) => s._id === "Resolved")?.count || 0;

        document.getElementById("totalComplaints").textContent = total;
        document.getElementById("pendingCount").textContent = pending;
        document.getElementById("inProgressCount").textContent = inProgress;
        document.getElementById("resolvedCount").textContent = resolved;
      }

      function renderCharts(data) {
        // Common chart options for responsiveness
        const commonOptions = {
          responsive: true,
          maintainAspectRatio: false,
          interaction: {
            intersect: false,
            mode: "index",
          },
        };

        // 1. Top 5 Categories (Horizontal Bar)
        const topCatCtx = document
          .getElementById("topCategoriesChart")
          .getContext("2d");
        const topCategories = [...data.categoryData]
          .sort((a, b) => b.count - a.count)
          .slice(0, 5);
        new Chart(topCatCtx, {
          type: "bar",
          data: {
            labels: topCategories.map((d) => d._id),
            datasets: [
              {
                label: "Complaints",
                data: topCategories.map((d) => d.count),
                backgroundColor: "#27ae60",
                borderRadius: 4,
              },
            ],
          },
          options: {
            ...commonOptions,
            indexAxis: "y",
            plugins: {
              legend: { display: false },
            },
            scales: {
              x: {
                beginAtZero: true,
                ticks: { stepSize: 1 },
              },
            },
          },
        });

        // 2. Status Distribution (Doughnut)
        const statCtx = document.getElementById("statusChart").getContext("2d");
        const statusColorMap = {
          Pending: "#f39c12",
          "In Progress": "#3498db",
          Resolved: "#27ae60",
        };
        new Chart(statCtx, {
          type: "doughnut",
          data: {
            labels: data.statusData.map((d) => d._id),
            datasets: [
              {
                data: data.statusData.map((d) => d.count),
                backgroundColor: data.statusData.map(
                  (d) => statusColorMap[d._id] || "#95a5a6",
                ),
                borderWidth: 2,
                borderColor: "#fff",
              },
            ],
          },
          options: {
            ...commonOptions,
            plugins: {
              legend: {
                position: "bottom",
                labels: {
                  padding: 15,
                  font: { size: 12 },
                },
              },
            },
          },
        });

        // 3. Trend Chart (Line with Area)
        const trendCtx = document.getElementById("trendChart").getContext("2d");
        const categoryByDate = data.categoryByDate || {};

        new Chart(trendCtx, {
          type: "line",
          data: {
            labels: data.dateData.map((d) => d._id),
            datasets: [
              {
                label: "Daily Submissions",
                data: data.dateData.map((d) => d.count),
                borderColor: "#2980b9",
                backgroundColor: "rgba(41, 128, 185, 0.1)",
                tension: 0.4,
                fill: true,
                pointRadius: 4,
                pointHoverRadius: 6,
              },
            ],
          },
          options: {
            ...commonOptions,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  title: function (context) {
                    return "Date: " + context[0].label;
                  },
                  label: function (context) {
                    return "Total Submissions: " + context.parsed.y;
                  },
                  afterLabel: function (context) {
                    const date = context.label;
                    const categories = categoryByDate[date];

                    if (!categories) return "";

                    // Build category breakdown
                    const lines = ["\nCategory Breakdown:"];
                    Object.entries(categories)
                      .sort((a, b) => b[1] - a[1]) // Sort by count descending
                      .forEach(([category, count]) => {
                        lines.push(`  • ${category}: ${count}`);
                      });

                    return lines.join("\n");
                  },
                },
                backgroundColor: "rgba(0, 0, 0, 0.8)",
                padding: 12,
                titleFont: { size: 14, weight: "bold" },
                bodyFont: { size: 13 },
                bodySpacing: 4,
                displayColors: false,
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: { stepSize: 1 },
              },
            },
          },
        });

        // 4. Resolution Time Chart (Bar)
        const resolutionCtx = document
          .getElementById("resolutionChart")
          .getContext("2d");
        const resolutionData = data.resolutionTimeData || {
          lessThan24h: 0,
          oneToThreeDays: 0,
          threeToSevenDays: 0,
          moreThanSevenDays: 0,
        };

        new Chart(resolutionCtx, {
          type: "bar",
          data: {
            labels: ["< 24h", "1-3 days", "3-7 days", "> 7 days"],
            datasets: [
              {
                label: "Complaints",
                data: [
                  resolutionData.lessThan24h,
                  resolutionData.oneToThreeDays,
                  resolutionData.threeToSevenDays,
                  resolutionData.moreThanSevenDays,
                ],
                backgroundColor: ["#27ae60", "#3498db", "#f39c12", "#e74c3c"],
                borderRadius: 4,
              },
            ],
          },
          options: {
            ...commonOptions,
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    return "Resolved: " + context.parsed.y + " complaints";
                  },
                },
              },
            },
            scales: {
              y: {
                beginAtZero: true,
                ticks: {
                  stepSize: 1,
                  precision: 0,
                },
              },
            },
          },
        });

        // 5. Category Chart (Horizontal Bar)
        const catCtx = document
          .getElementById("categoryChart")
          .getContext("2d");
        new Chart(catCtx, {
          type: "bar",
          data: {
            labels: data.categoryData.map((d) => d._id),
            datasets: [
              {
                label: "Number of Complaints",
                data: data.categoryData.map((d) => d.count),
                backgroundColor: "#2c3e50",
                borderRadius: 4,
              },
            ],
          },
          options: {
            ...commonOptions,
            indexAxis: "y",
            plugins: {
              legend: { display: false },
              tooltip: {
                callbacks: {
                  label: function (context) {
                    return "Complaints: " + context.parsed.x;
                  },
                },
              },
            },
            scales: {
              x: {
                beginAtZero: true,
                ticks: { stepSize: 1 },
              },
            },
          },
        });
      }

      // Run on load
      loadAnalytics();
    </script>
  </body>
</html>
